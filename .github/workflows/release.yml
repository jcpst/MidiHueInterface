name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build release for'
        required: true
        type: string

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore --configuration Release
      
    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal

  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      matrix:
        include:
          # Windows
          - os: windows
            arch: x64
            runner: windows-latest
            runtime: win-x64
            extension: .exe
          # macOS
          - os: macos
            arch: x64
            runner: macos-13
            runtime: osx-x64
            extension: ''
          - os: macos
            arch: arm64
            runner: macos-latest
            runtime: osx-arm64
            extension: ''
          # Linux
          - os: linux
            arch: x64
            runner: ubuntu-latest
            runtime: linux-x64
            extension: ''

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Publish
      run: |
        dotnet publish MidiHueInterface.Console/MidiHueInterface.Console.csproj \
          --configuration Release \
          --runtime ${{ matrix.runtime }} \
          --self-contained true \
          --output ./publish/${{ matrix.os }}-${{ matrix.arch }} \
          /p:PublishSingleFile=true \
          /p:PublishTrimmed=true \
          /p:TrimMode=partial \
          /p:DebugType=None \
          /p:DebugSymbols=false
          
    - name: Create archive (Windows)
      if: matrix.os == 'windows'
      run: |
        cd publish/${{ matrix.os }}-${{ matrix.arch }}
        7z a ../../MidiHueInterface-${{ matrix.os }}-${{ matrix.arch }}.zip *
        
    - name: Create archive (Unix)
      if: matrix.os != 'windows'
      run: |
        cd publish/${{ matrix.os }}-${{ matrix.arch }}
        tar -czf ../../MidiHueInterface-${{ matrix.os }}-${{ matrix.arch }}.tar.gz *
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MidiHueInterface-${{ matrix.os }}-${{ matrix.arch }}
        path: |
          MidiHueInterface-${{ matrix.os }}-${{ matrix.arch }}.zip
          MidiHueInterface-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
        if-no-files-found: ignore

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
        
    - name: Prepare release files
      run: |
        mkdir -p ./release-files
        find ./artifacts -name "*.zip" -o -name "*.tar.gz" | xargs -I {} cp {} ./release-files/
        ls -la ./release-files/
        
    - name: Determine tag
      id: tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: Release ${{ steps.tag.outputs.tag }}
        draft: false
        prerelease: false
        files: ./release-files/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}